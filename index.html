<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Website</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-content">
        <div class="logo">MyBrand</div>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
        </ul>
      </div>
    </nav>
    <!-- The wrapper element -->
    <div class="container">
      <h1>Welcome to My Site</h1>
      <p>This content will stay between those red line margins!</p>
    </div>
    <div class="carousel-wrapper">
      <!-- The images inside the slider -->
      <div class="carousel-slide">
        <img class="carousel-img" src="images/orange.jpg" alt="Orange Image" />
        <img class="carousel-img" src="images/purple.png" alt="Purple Image" />
        <img
          class="carousel-img"
          src="images/Solid_black.png"
          alt="Solid Black Image"
        />
      </div>

      <!-- Navigation Buttons -->
      <button class="carousel-btn prev-btn">❮</button>
      <button class="carousel-btn next-btn">❯</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
